[[IgnoredVulns]]
id = "GHSA-2mjp-6q6p-2qxm"
reason = "undici is a transitive dependency via actions-output-wrapper -> @actions/core@1.11.1 -> @actions/http-client@2.2.3. The wrapper feature only renames a binary and installs a shim; it never triggers HTTP requests through this code path, so the vulnerability is not exploitable."

